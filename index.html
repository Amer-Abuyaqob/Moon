<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Moon</title>
    <link rel="stylesheet" href="main.css" />
    <link rel="stylesheet" href="main.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <main>
      <section class="header">
        <div class="container">
          <div class="row">
            <div class="logo">
              <a href="#">
                <img src="./images/logo.svg" alt="Moon Logo" />
              </a>
            </div>
            <div class="nav">
              <ul class="row">
                <li>
                  <a href="#" class="display-2">Home</a>
                </li>
                <li>
                  <a href="#" class="display-2">Shop</a>
                </li>
                <li>
                  <a href="#" class="display-2">About</a>
                </li>
                <li>
                  <a href="#" class="display-2">Contact</a>
                </li>
              </ul>
            </div>
            <div class="menu">
              <ul class="row">
                <li>
                  <a href="#">
                    <img src="./images/Header Right/Search.svg" alt="Search" />
                  </a>
                </li>
                <li>
                  <a href="#">
                    <img src="./images/Header Right/Avatar.svg" alt="Avatar" />
                  </a>
                </li>
                <li>
                  <a href="#">
                    <img src="./images/Header Right/Heart.svg" alt="Heart" />
                  </a>
                </li>
                <li>
                  <a href="#">
                    <img
                      src="./images/Header Right/Shopping cart.svg"
                      alt="Cart"
                    />
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </section>

      <section class="collections">
        <div class="container">
          <div class="row">
            <div class="card">
              <img src="./images/tableware.png" alt="Tableware" />
              <div class="row">
                <p class="display-4">TABLEWARE</p>
              </div>
            </div>
            <div class="card">
              <img src="./images/home-decor.png" alt="Home Decor" />
              <div class="row">
                <p class="display-4">HOME DECOR</p>
              </div>
            </div>
            <div class="card">
              <img src="./images/holiday.png" alt="Holiday" />
              <div class="row">
                <p class="display-4">HOLIDAY</p>
              </div>
            </div>
            <div class="card">
              <img src="./images/collection.png" alt="Collection" />
              <div class="row">
                <p class="display-4">COLLECTION</p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="best-sellers"></section>
    </main>
  </body>
</html>
